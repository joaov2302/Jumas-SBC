        </div>
    </nav>
  </header>

  <main class="container mt-4">
    <section
      style="background-color: #f4eaff; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto;"
      data-aos="fade-up"
    >
      <h2 data-aos="fade-up" data-aos-delay="100">Cadastro</h2>
      <form data-aos="fade-up" data-aos-delay="200">
        <div class="mb-3" data-aos="fade-right" data-aos-delay="300">
          <label for="nome" class="form-label">Nome completo:</label>
          <input type="text" class="form-control" id="nome" placeholder="Insira seu nome" required />
        </div>

        <div class="mb-3" data-aos="fade-right" data-aos-delay="300">
          <label for="CPF" class="form-label">CPF:</label>
          <input type="text" class="form-control" id="CPF" placeholder="Insira seu CPF" required />
        </div>

        <div class="mb-3" data-aos="fade-left" data-aos-delay="400">
          <label for="email" class="form-label">E-mail:</label>
          <input type="email" class="form-control" id="email" placeholder="Insira seu E-mail" required />
        </div>

        <div class="mb-3 position-relative" data-aos="fade-right" data-aos-delay="500">
          <label for="senha" class="form-label">Senha:</label>
          <div class="input-group">
            <input type="password" id="senha" name="Senha" class="form-control" placeholder="Insira sua Senha" required />
            <button class="btn btn-outline-secondary" type="button" onclick="mostrarSenha()" tabindex="-1" style="padding: 0 10px;">
              <img id="iconeSenha" src="img/olho-fechado.png" alt="Ver senha" style="height: 24px;" />
            </button>
          </div>
        </div>


        <div class="mb-3" data-aos="fade-left" data-aos-delay="600">
          <label for="data" class="form-label">Data de Nascimento:</label>
          <input type="date" class="form-control" id="data" required />
        </div>

        <div class="mb-3" data-aos="fade-right" data-aos-delay="700">
          <label class="form-label">Gênero:</label><br />
          <input type="radio" id="masc" name="genero" value="masculino" />
          <label for="masc">Masculino</label><br />
          <input type="radio" id="fem" name="genero" value="feminino" />
          <label for="fem">Feminino</label><br />
          <input type="radio" id="outro" name="genero" value="outro" />
          <label for="outro">Outro</label>
        </div>

        <div class="mb-3" data-aos="fade-left" data-aos-delay="800">
          <label class="form-label">Para onde deseja viajar?</label><br />
          <input type="checkbox" id="exterior" name="interesse" value="exterior" />
          <label for="exterior">Exterior</label><br />
          <input type="checkbox" id="design" name="interesse" value="interior" />
          <label for="design">Interior</label><br />
        </div>

        <div class="mb-3" data-aos="fade-right" data-aos-delay="900">
          <label for="estado-civil" class="form-label">Estado Civil:</label>
          <select class="form-select" id="estado-civil">
            <option value="">Selecione</option>
            <option value="solteiro">Solteiro(a)</option>
            <option value="casado">Casado(a)</option>
            <option value="divorciado">Divorciado(a)</option>
            <option value="viuvo">Viúvo(a)</option>
          </select>
        </div>

        <div class="mb-3" data-aos="fade-right" data-aos-delay="1100">
          <label for="telefone" class="form-label">Telefone:</label>
          <input type="tel" class="form-control" id="telefone" />
        </div>

       
        <div class="mt-4 d-flex flex-wrap gap-2" data-aos="fade-up" data-aos-delay="1200">

        <button type="submit" class="btnLimpar" onclick="cadastroOnclick(event)">Continuar</button>

          <button type="reset" class="btnLimpar">Limpar</button>
        </div>
      </form>
    </section>
  </main>

  <br /><br /><br />
  <footer class="custom-footer" data-aos="fade-up" >
    <div class="footer-content">
      <div class="footer-logo">
        <br /><br />

      </div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 600,
    once: true,
  });
  function mostrarSenha() {
    const senha = document.getElementById("senha");
    const icone = document.getElementById("iconeSenha");

    if (senha.type === "password") {
      senha.type = "text";
      icone.src = "img/olho-fechado.png"; 
    } else {
      senha.type = "password";
      icone.src = "img/olho-aberto.png"; 
    }
  }
</script>
</body>
</html>
