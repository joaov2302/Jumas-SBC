    <main class="container mt-4" id="main-content" data-aos="fade-up" data-aos-duration="800" data-aos-delay="200">
        <h1>Contato</h1>
        <p>Entre em contato conosco através do formulário abaixo:</p>
        <form class="custom-form" action="https://formsubmit.co/testedeveloper07@gmail.com" method="POST">
          <div class="form-group" data-aos="fade-up" data-aos-duration="800" data-aos-delay="300">
            <label for="name">Nome:</label>
            <input type="text" name="Nome" class="form-control" id="Nome" required />
          </div>
          <div class="form-group" data-aos="fade-up" data-aos-duration="800" data-aos-delay="400">
            <label for="email">Email:</label>
            <input type="email" name="E-mail" class="form-control" id="E-mail" required />
          </div>
          <div class="form-group" data-aos="fade-up" data-aos-duration="800" data-aos-delay="500">
            <label for="message">Mensagem:</label>
            <textarea name="Mensagem" class="form-control" id="Mensagem" rows="4" required></textarea>
          </div>
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="http://127.0.0.1:5501/contato.html" />
          <button onclick="alert('Contato Enviado. Obrigado!')" type="submit" class="btn btn-primary" data-aos="zoom-in" data-aos-duration="700" data-aos-delay="600">Enviar</button>
        </form>
